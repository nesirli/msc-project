[pytest]
# Pytest configuration
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --tb=short
    --color=yes
markers =
    unit: Unit tests for utility functions
    integration: Integration tests
    slow: Slow running tests
    skip_ci: Tests to skip on CI
